<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beni Özledin mi?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Soru Baloncuğu -->
        <div class="question-bubble" id="questionBubble">
            <p>Beni özledin mi? 💭</p>
            <button class="yes-btn" id="yesBtn">Evet</button>
        </div>

        <!-- Sonuç Ekranı -->
        <div class="result-screen" id="resultScreen" style="display: none;">
            <div class="flowers-hearts" id="flowersHearts"></div>
            <div class="message" id="message">bende seni çok özledim birtanem</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
